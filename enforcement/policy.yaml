{
  "protected_paths": [
    "<hermes-home>/config.yaml",
    "<hermes-home>/bin/**",
    "<vault>/.evidence-first/**"
  ],
  "credential_patterns": {
    "aws-access-key": "AKIA[0-9A-Z]{16}",
    "github-token": "gh[pousr]_[A-Za-z0-9]{36,}",
    "openai-api-key": "sk-[A-Za-z0-9_-]{20,}",
    "pem-private-key": "-----BEGIN (?:[A-Z0-9]+ )?PRIVATE KEY-----",
    "assigned-secret": "(?i)(?:password|secret|token|api[_-]?key)[\\\"']?\\s*[:=]\\s*[\\\"']?\\S{8,}"
  },
  "caps": {
    "default_retrieval_limit": 25
  },
  "completion": {
    "canonical_source": "scripts/evaluation_lib.py",
    "dispositions": [
      "act",
      "watch",
      "no-action",
      "blocked",
      "done",
      "kill",
      "needs-human"
    ],
    "legacy_aliases": {
      "merge": "done",
      "defer": "watch",
      "no-edge": "no-action"
    },
    "parked_dispositions": [
      "watch",
      "no-action"
    ],
    "parked_state_patterns": {
      "state_change_or_trigger": "(?i)state.change|trigger",
      "decay_or_review_date": "(?i)decay|review date"
    }
  }
}
